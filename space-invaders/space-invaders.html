<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Invaders</title>
  <link rel="stylesheet" href="./space-invaders.css" />
</head>
<body>
  <main class="app">
    <a class="nav-link" href="../index.html">Back to Game Hub</a>
    <div class="top">
      <h1>Space Invaders</h1>
      <div class="stats">
        <span>Score: <strong id="score">0</strong></span>
        <span>High Score: <strong id="highScore">0</strong></span>
        <span>Status: <strong id="status">ready</strong></span>
      </div>
      <div>
        <button id="startBtn" type="button">Start Game</button>
        <button id="resetBtn" type="button">Reset Game</button>
      </div>
    </div>
    <canvas id="gameCanvas" width="900" height="600" aria-label="Space Invaders"></canvas>
    <p class="hint">Arrow Left/Right เพื่อขยับยาน, Spacebar เพื่อยิง</p>
  </main>
  <script src="./space-invaders.js"></script>
</body>
</html>

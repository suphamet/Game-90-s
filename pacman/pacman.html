<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pac-Man</title>
  <link rel="stylesheet" href="./pacman.css" />
</head>
<body>
  <main class="app">
    <a class="nav-link" href="../index.html">Back to Game Hub</a>

    <div class="top">
      <h1>Pac-Man</h1>
      <div class="hud">
        <span>Score: <strong id="scoreValue">0</strong></span>
        <span>Lives: <strong id="livesValue">3</strong></span>
        <span>Status: <strong id="statusValue">ready</strong></span>
      </div>
      <div class="actions">
        <button id="startBtn" type="button">Start</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>
    </div>

    <canvas id="game" width="896" height="672" aria-label="Pac-Man game"></canvas>
    <p class="hint">Arrow keys: move | กินจุดให้ครบเพื่อชนะ | กิน Power Pellet เพื่อไล่กินผีชั่วคราว</p>
  </main>

  <script src="./pacman.js"></script>
</body>
</html>

<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2f;
      --line: #2f3a61;
      --text: #eff3ff;
      --muted: #9fadcf;
      --accent: #6fa8ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f2743 0%, #11162a 58%, #0b0f1b 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      padding: 1rem;
    }

    .app {
      width: min(960px, 96vw);
      background: linear-gradient(160deg, #1a2240 0%, #121a32 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1rem;
    }

    .nav-link {
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 0.8rem;
      display: inline-block;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    h1 { margin: 0; font-size: 1.35rem; }

    .stats { display: flex; gap: 0.8rem; color: var(--muted); }

    button {
      border: 1px solid var(--line);
      background: #1b2749;
      color: var(--text);
      padding: 0.45rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    canvas {
      display: block;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 3 / 2;
      height: auto;
      border: 1px solid #334270;
      border-radius: 10px;
      background: #0b1221;
    }

    .hint {
      margin: 0.8rem 0 0;
      font-size: 0.92rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="app">
    <a class="nav-link" href="../index.html">Back to Game Hub</a>
    <div class="top">
      <h1>Breakout</h1>
      <div class="stats">
        <span>Score: <strong id="score">0</strong></span>
        <span>Lives: <strong id="lives">❤❤❤</strong></span>
        <span>Status: <strong id="status">ready</strong></span>
      </div>
      <div>
        <button id="startBtn" type="button">Start Game</button>
        <button id="resetBtn" type="button">Reset Game</button>
      </div>
    </div>
    <canvas id="gameCanvas" width="900" height="600" aria-label="Breakout game"></canvas>
    <p class="hint">ควบคุมแผ่นด้วยเมาส์ หรือปุ่มลูกศรซ้าย/ขวา</p>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");

    const BRICK_ROWS = 6;
    const BRICK_COLS = 11;
    const BRICK_W = 66;
    const BRICK_H = 24;
    const BRICK_GAP = 8;
    const BRICK_TOP = 72;
    const BRICK_LEFT = 46;
    const BRICK_COLORS = ["#ff6b6b", "#ffa94d", "#ffd43b", "#69db7c", "#4dabf7", "#b197fc"];

    const state = {
      running: false,
      score: 0,
      lives: 3,
      destroyed: 0,
      shake: 0,
      keys: { left: false, right: false },
      paddle: null,
      ball: null,
      bricks: [],
      lastTime: 0,
    };

    function makePaddle() {
      return { x: canvas.width / 2 - 70, y: canvas.height - 34, width: 140, height: 14, speed: 520 };
    }

    function makeBall() {
      return { x: canvas.width / 2, y: canvas.height - 52, radius: 9, vx: 240, vy: -240 };
    }

    function makeBricks() {
      const bricks = [];
      for (let r = 0; r < BRICK_ROWS; r += 1) {
        for (let c = 0; c < BRICK_COLS; c += 1) {
          bricks.push({
            x: BRICK_LEFT + c * (BRICK_W + BRICK_GAP),
            y: BRICK_TOP + r * (BRICK_H + BRICK_GAP),
            width: BRICK_W,
            height: BRICK_H,
            color: BRICK_COLORS[r % BRICK_COLORS.length],
            active: true,
          });
        }
      }
      return bricks;
    }

    function resetState() {
      state.running = false;
      state.score = 0;
      state.lives = 3;
      state.destroyed = 0;
      state.shake = 0;
      state.paddle = makePaddle();
      state.ball = makeBall();
      state.bricks = makeBricks();
      state.lastTime = 0;
      statusEl.textContent = "ready";
      syncHud();
      draw();
    }

    function startGame() {
      resetState();
      state.running = true;
      statusEl.textContent = "running";
      requestAnimationFrame(loop);
    }

    function syncHud() {
      scoreEl.textContent = String(state.score);
      livesEl.textContent = "❤".repeat(state.lives) || "-";
    }

    function reflectBallFromPaddle() {
      const p = state.paddle;
      const b = state.ball;
      const hitPoint = (b.x - (p.x + p.width / 2)) / (p.width / 2);
      b.vx = hitPoint * 340;
      b.vy = -Math.abs(b.vy);
    }

    function increaseSpeedEveryTenBricks() {
      if (state.destroyed > 0 && state.destroyed % 10 === 0) {
        state.ball.vx *= 1.07;
        state.ball.vy *= 1.07;
      }
    }

    function movePaddle(dt) {
      const p = state.paddle;
      if (state.keys.left) {
        p.x -= p.speed * dt;
      }
      if (state.keys.right) {
        p.x += p.speed * dt;
      }
      p.x = Math.max(0, Math.min(canvas.width - p.width, p.x));
    }

    function moveBall(dt) {
      const b = state.ball;
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if (b.x - b.radius <= 0) {
        b.x = b.radius;
        b.vx *= -1;
      }
      if (b.x + b.radius >= canvas.width) {
        b.x = canvas.width - b.radius;
        b.vx *= -1;
      }
      if (b.y - b.radius <= 0) {
        b.y = b.radius;
        b.vy *= -1;
      }

      const p = state.paddle;
      if (
        b.x + b.radius >= p.x &&
        b.x - b.radius <= p.x + p.width &&
        b.y + b.radius >= p.y &&
        b.y - b.radius <= p.y + p.height &&
        b.vy > 0
      ) {
        b.y = p.y - b.radius;
        reflectBallFromPaddle();
      }

      if (b.y - b.radius > canvas.height) {
        loseLife();
      }
    }

    function loseLife() {
      state.lives -= 1;
      syncHud();
      if (state.lives <= 0) {
        state.running = false;
        statusEl.textContent = "game over";
        return;
      }
      state.ball = makeBall();
      state.paddle = makePaddle();
    }

    function hitBrick(b, brick) {
      return (
        b.x + b.radius > brick.x &&
        b.x - b.radius < brick.x + brick.width &&
        b.y + b.radius > brick.y &&
        b.y - b.radius < brick.y + brick.height
      );
    }

    function collideBricks() {
      const b = state.ball;
      for (const brick of state.bricks) {
        if (!brick.active) {
          continue;
        }

        if (hitBrick(b, brick)) {
          brick.active = false;
          b.vy *= -1;
          state.score += 100;
          state.destroyed += 1;
          state.shake = 7;
          increaseSpeedEveryTenBricks();
          syncHud();

          if (state.bricks.every((x) => !x.active)) {
            state.running = false;
            statusEl.textContent = "win";
          }
          return;
        }
      }
    }

    function update(dt) {
      movePaddle(dt);
      moveBall(dt);
      collideBricks();
      state.shake = Math.max(0, state.shake - 0.8);
    }

    function drawBackground() {
      ctx.fillStyle = "#0b1221";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawPaddle() {
      const p = state.paddle;
      ctx.fillStyle = "#7eb5ff";
      ctx.fillRect(p.x, p.y, p.width, p.height);
    }

    function drawBall() {
      const b = state.ball;
      ctx.beginPath();
      ctx.fillStyle = "#ffffff";
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBricks() {
      state.bricks.forEach((brick) => {
        if (!brick.active) {
          return;
        }
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.strokeRect(brick.x + 1, brick.y + 1, brick.width - 2, brick.height - 2);
      });
    }

    function draw() {
      const shakeX = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
      const shakeY = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;

      ctx.save();
      ctx.translate(shakeX, shakeY);
      drawBackground();
      drawBricks();
      drawPaddle();
      drawBall();
      ctx.restore();
    }

    function loop(timestamp) {
      if (!state.running) {
        draw();
        return;
      }

      if (!state.lastTime) {
        state.lastTime = timestamp;
      }

      const dt = (timestamp - state.lastTime) / 1000;
      state.lastTime = timestamp;

      update(dt);
      draw();

      if (state.running) {
        requestAnimationFrame(loop);
      }
    }

    canvas.addEventListener("mousemove", (event) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const mouseX = (event.clientX - rect.left) * scaleX;
      state.paddle.x = mouseX - state.paddle.width / 2;
      state.paddle.x = Math.max(0, Math.min(canvas.width - state.paddle.width, state.paddle.x));
    });

    window.addEventListener("keydown", (event) => {
      if (event.code === "ArrowLeft") {
        event.preventDefault();
        state.keys.left = true;
      } else if (event.code === "ArrowRight") {
        event.preventDefault();
        state.keys.right = true;
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "ArrowLeft") {
        state.keys.left = false;
      } else if (event.code === "ArrowRight") {
        state.keys.right = false;
      }
    });

    startBtn.addEventListener("click", startGame);
    resetBtn.addEventListener("click", resetState);

    resetState();
  </script>
</body>
</html>

<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong - Retro Neon</title>
  <link rel="stylesheet" href="./pong.css" />
</head>
<body>
  <main class="app">
    <a class="nav-link" href="../index.html">Back to Game Hub</a>
    <div class="top">
      <h1>PONG - RETRO NEON</h1>
      <div class="status">Control: Mouse or W/S | First to 5 wins</div>
    </div>
    <canvas id="pong" width="960" height="540" aria-label="Pong board"></canvas>
    <p class="hint">ผู้เล่นอยู่ฝั่งซ้าย | CPU อยู่ฝั่งขวา</p>
  </main>

  <section id="resultOverlay" class="overlay" aria-live="polite">
    <div class="dialog">
      <h2 id="winnerText">You Win</h2>
      <button id="playAgainBtn" type="button">Play Again</button>
    </div>
  </section>

  <script src="./pong.js"></script>
</body>
</html>

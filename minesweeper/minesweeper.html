<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper</title>
  <link rel="stylesheet" href="./minesweeper.css" />
</head>
<body>
  <main class="app">
    <a class="nav-link" href="../index.html">Back to Game Hub</a>
    <div class="header">
      <h1>Minesweeper 10x10</h1>
      <div class="status">
        <span class="bomb-counter">Mines Left: <strong id="minesLeft">15</strong></span>
        <span class="state">Status: <strong id="gameState">ready</strong></span>
        <button id="resetBtn" type="button">Reset Game</button>
      </div>
    </div>
    <section id="board" class="board" aria-label="Minesweeper board"></section>
  </main>

  <script src="./minesweeper.js"></script>
</body>
</html>

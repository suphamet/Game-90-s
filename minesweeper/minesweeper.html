<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper</title>
  <style>
    :root {
      --bg: #1a1b26;
      --panel: #222437;
      --tile: #2c2f47;
      --tile-open: #1c1f31;
      --line: #454b70;
      --text: #eaf0ff;
      --muted: #9ea7cb;
      --accent: #ffcb6b;
      --danger: #ff6b7a;
      --flag: #ff9f43;
      --glow: 0 0 8px rgba(255, 203, 107, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #2a2f4f 0%, #1a1b26 55%, #11121a 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      padding: 1rem;
    }

    .app {
      width: min(560px, 96vw);
      background: linear-gradient(160deg, var(--panel) 0%, #1d2031 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    }

    .nav-link {
      color: var(--accent);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 0.8rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }

    h1 { margin: 0; font-size: 1.4rem; letter-spacing: 0.4px; }

    .status {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .bomb-counter strong,
    .state strong { color: var(--text); }

    button {
      background: #2a2e46;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 0.45rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: var(--glow);
    }

    button:hover { border-color: var(--accent); }

    .board {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      background: #171a28;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px;
      user-select: none;
    }

    .cell {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid #596290;
      border-radius: 6px;
      background: var(--tile);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      cursor: pointer;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
    }

    .cell.open {
      background: var(--tile-open);
      border-color: #333a5a;
      cursor: default;
    }

    .cell.mine.open {
      background: #3d1e2a;
      border-color: #8a3b56;
      color: var(--danger);
    }

    .cell.flagged {
      color: var(--flag);
      text-shadow: 0 0 8px rgba(255, 159, 67, 0.8);
    }

    .n1 { color: #80d8ff; }
    .n2 { color: #76ff9b; }
    .n3 { color: #ffd166; }
    .n4 { color: #ff8fab; }
    .n5 { color: #ffa94d; }
    .n6 { color: #b197fc; }
    .n7 { color: #e9ecef; }
    .n8 { color: #adb5bd; }
  </style>
</head>
<body>
  <main class="app">
    <a class="nav-link" href="../index.html">Back to Game Hub</a>
    <div class="header">
      <h1>Minesweeper 10x10</h1>
      <div class="status">
        <span class="bomb-counter">Mines Left: <strong id="minesLeft">15</strong></span>
        <span class="state">Status: <strong id="gameState">ready</strong></span>
        <button id="resetBtn" type="button">Reset Game</button>
      </div>
    </div>
    <section id="board" class="board" aria-label="Minesweeper board"></section>
  </main>

  <script>
    const SIZE = 10;
    const MINES = 15;

    const boardEl = document.getElementById("board");
    const minesLeftEl = document.getElementById("minesLeft");
    const gameStateEl = document.getElementById("gameState");
    const resetBtn = document.getElementById("resetBtn");

    let board = [];
    let gameOver = false;
    let openedCells = 0;
    let flagsUsed = 0;

    function createCell() {
      return { mine: false, revealed: false, flagged: false, nearby: 0 };
    }

    function initBoard() {
      board = Array.from({ length: SIZE }, () => Array.from({ length: SIZE }, createCell));
      gameOver = false;
      openedCells = 0;
      flagsUsed = 0;
      gameStateEl.textContent = "running";

      placeMines();
      calculateNearbyCounts();
      renderBoard();
      updateMinesLeft();
    }

    function placeMines() {
      let placed = 0;
      while (placed < MINES) {
        const row = Math.floor(Math.random() * SIZE);
        const col = Math.floor(Math.random() * SIZE);
        if (!board[row][col].mine) {
          board[row][col].mine = true;
          placed += 1;
        }
      }
    }

    function inBounds(row, col) {
      return row >= 0 && row < SIZE && col >= 0 && col < SIZE;
    }

    function getNeighbors(row, col) {
      const neighbors = [];
      for (let dr = -1; dr <= 1; dr += 1) {
        for (let dc = -1; dc <= 1; dc += 1) {
          if (dr === 0 && dc === 0) {
            continue;
          }
          const nr = row + dr;
          const nc = col + dc;
          if (inBounds(nr, nc)) {
            neighbors.push({ row: nr, col: nc });
          }
        }
      }
      return neighbors;
    }

    function calculateNearbyCounts() {
      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          if (board[row][col].mine) {
            continue;
          }
          const mines = getNeighbors(row, col).filter(({ row: r, col: c }) => board[r][c].mine).length;
          board[row][col].nearby = mines;
        }
      }
    }

    function revealCell(row, col) {
      const cell = board[row][col];
      if (cell.revealed || cell.flagged || gameOver) {
        return;
      }

      cell.revealed = true;
      openedCells += 1;

      if (cell.mine) {
        triggerGameOver();
        return;
      }

      if (cell.nearby === 0) {
        floodFill(row, col);
      }

      checkWin();
      renderBoard();
    }

    function floodFill(startRow, startCol) {
      const queue = [{ row: startRow, col: startCol }];
      while (queue.length > 0) {
        const { row, col } = queue.shift();
        getNeighbors(row, col).forEach(({ row: nr, col: nc }) => {
          const next = board[nr][nc];
          if (next.revealed || next.flagged || next.mine) {
            return;
          }

          next.revealed = true;
          openedCells += 1;

          if (next.nearby === 0) {
            queue.push({ row: nr, col: nc });
          }
        });
      }
    }

    function toggleFlag(row, col) {
      const cell = board[row][col];
      if (cell.revealed || gameOver) {
        return;
      }

      cell.flagged = !cell.flagged;
      flagsUsed += cell.flagged ? 1 : -1;
      updateMinesLeft();
      renderBoard();
    }

    function updateMinesLeft() {
      minesLeftEl.textContent = String(Math.max(0, MINES - flagsUsed));
    }

    function triggerGameOver() {
      gameOver = true;
      gameStateEl.textContent = "game over";
      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          if (board[row][col].mine) {
            board[row][col].revealed = true;
          }
        }
      }
      renderBoard();
      alert("Game Over: เจอระเบิด");
    }

    function checkWin() {
      if (gameOver) {
        return;
      }
      const safeCells = SIZE * SIZE - MINES;
      if (openedCells >= safeCells) {
        gameOver = true;
        gameStateEl.textContent = "win";
        alert("ชนะแล้ว เปิดครบทุกช่องที่ไม่ใช่ระเบิด");
      }
    }

    function cellContent(cell) {
      if (cell.flagged && !cell.revealed) {
        return "⚑";
      }
      if (!cell.revealed) {
        return "";
      }
      if (cell.mine) {
        return "✹";
      }
      return cell.nearby > 0 ? String(cell.nearby) : "";
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          const cell = board[row][col];
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "cell";
          btn.dataset.row = String(row);
          btn.dataset.col = String(col);
          btn.textContent = cellContent(cell);

          if (cell.revealed) {
            btn.classList.add("open");
          }
          if (cell.mine && cell.revealed) {
            btn.classList.add("mine");
          }
          if (cell.flagged) {
            btn.classList.add("flagged");
          }
          if (cell.revealed && cell.nearby > 0) {
            btn.classList.add(`n${cell.nearby}`);
          }

          btn.addEventListener("click", () => revealCell(row, col));
          btn.addEventListener("contextmenu", (event) => {
            event.preventDefault();
            toggleFlag(row, col);
          });

          boardEl.appendChild(btn);
        }
      }
    }

    resetBtn.addEventListener("click", initBoard);
    initBoard();
  </script>
</body>
</html>
